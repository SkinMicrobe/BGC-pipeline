# BGC Pipeline 用户输入配置
# 每次运行前填写此文件

# ============================================
# 模式选择
# ============================================
# 选择运行模式：prokaryote（原核生物）或 eukaryote（真核生物）
mode: "prokaryote"

# ============================================
# 必填路径参数
# ============================================
# 输入fasta目录路径
input_fasta_dir: "/path/to/input/fasta"

# 输出目录路径（脚本会自动创建子目录）
output_dir: "/path/to/output"

# ============================================
# 线程数配置（覆盖默认值）
# ============================================
threads:
  bakta: 32
  antismash: 32
  bigmap_family: 48
  bigmap_map: 36
  metaeuk: 16

# ============================================
# 原核模式专用参数
# ============================================
prokaryote:
  # 原始测序fastq文件目录（用于定量）
  # fastq文件以.fastq.gz结尾，支持单端和双端数据
  fastq_dir: "/path/to/fastq/files"

  # [可选] 是否运行deepBGC
  run_deepbgc: false

  # [可选] 是否运行eggNOG mapper
  run_eggnog: false

# ============================================
# 真核模式专用参数
# ============================================
eukaryote:
  # MAG fasta文件目录
  mag_dir: "/path/to/mag/files"

  # 输入MAG文件扩展名
  mag_extension: ".fa.gz"

# ============================================
# 高级选项（通常不需要修改）
# ============================================
advanced:
  # 是否跳过已有结果（断点续传）
  skip_existing: true

  # 是否保留临时文件
  keep_temp_files: false

  # 日志级别：debug, info, warn, error
  log_level: "info"